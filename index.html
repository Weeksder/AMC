<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1d23">
  <meta name="format-detection" content="telephone=no">
  <title>PPTX Notes Viewer</title>
  <style>
    :root {
      --bg: #1a1d23;
      --card: #252a33;
      --border: #3a4150;
      --text: #eef1f6;
      --muted: #9aa3b2;
      --accent: #e36c0a;
      --accent-hover: #f07d1c;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #2a3140 0%, var(--bg) 55%);
      color: var(--text);
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: calc(32px + var(--safe-top)) 20px calc(48px + var(--safe-bottom));
    }
    h1 {
      font-size: 1.7rem;
      font-weight: 650;
      margin: 0 0 20px;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .drop {
      border: 2px dashed var(--border);
      border-radius: 16px;
      background: var(--card);
      padding: 36px 20px;
      text-align: center;
      transition: border-color .15s, background .15s;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .drop:hover, .drop.dragover, .drop:focus-visible {
      border-color: var(--accent);
      background: #2c3340;
      outline: none;
    }
    .drop .icon { font-size: 2.2rem; margin-bottom: 10px; }
    .drop strong { display: block; font-size: 1.05rem; margin-bottom: 6px; }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    button, a.btn {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      min-height: 48px;
      touch-action: manipulation;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:active { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.55; cursor: default; }
    .btn-shortcuts {
      background: #4a5568;
      color: #fff;
      width: 100%;
      margin-top: 16px;
    }
    .btn-shortcuts:active { background: #2d3748; }
    .btn-amc {
      background: #2b6cb0;
      color: #fff;
      width: 100%;
      margin-top: 10px;
    }
    .btn-amc:active { background: #2c5282; }
    .feedback-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
      margin-top: 10px;
    }
    .btn-feedback {
      flex: 1;
      background: #2f855a;
      color: #fff;
      min-height: 48px;
    }
    .btn-feedback:active { background: #276749; }
    .btn-sentences {
      flex: 1;
      background: #6b46c1;
      color: #fff;
      min-height: 48px;
    }
    .btn-sentences:active { background: #553c9a; }
    .btn-snippet-edit {
      flex: 0 0 44px;
      width: 44px;
      min-width: 44px;
      padding: 0;
      background: #3a4150;
      color: #eef1f6;
      font-size: 1.15rem;
      line-height: 1;
      border: 1px solid var(--border);
    }
    .btn-snippet-edit:active { background: #4a5568; }
    .btn-snippet-edit:hover { background: #454d5c; }
    .snippet-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,.55);
      padding: calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
      align-items: center;
      justify-content: center;
    }
    .snippet-modal.open { display: flex; }
    .snippet-modal-card {
      width: min(560px, 100%);
      max-height: min(85vh, 720px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }
    .snippet-modal-card h3 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 650;
    }
    .snippet-modal-card textarea {
      width: 100%;
      min-height: 220px;
      flex: 1;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #1a1d23;
      color: var(--text);
      padding: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .snippet-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .snippet-modal-actions .btn-primary { min-width: 100px; }
    .snippet-modal-actions .btn-cancel {
      background: #3a4150;
      color: #eef1f6;
    }
    .status {
      margin-top: 18px;
      min-height: 1.4em;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
      word-break: break-word;
    }
    .status.error { color: #ff8e8e; }
    .status.ok { color: #8fd49a; }
    .file-input-wrap {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
    }
    /* —— AMC tools section (below notes viewer) —— */
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px calc(40px + var(--safe-bottom));
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 36px 0 28px;
    }
    .amc-section-head {
      margin: 0 0 14px;
      font-size: 1.45rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .help-btn {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      min-height: 28px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #3a4150;
      color: #eef1f6;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
    }
    .help-btn:hover { background: #4a5568; }
    .help-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1100;
      background: rgba(0,0,0,.55);
      padding: calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
      align-items: center;
      justify-content: center;
    }
    .help-modal.open { display: flex; }
    .help-modal-card {
      width: min(520px, 100%);
      max-height: min(80vh, 640px);
      overflow: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }
    .help-modal-card h3 { margin: 0 0 10px; font-size: 1.1rem; }
    .help-modal-card p, .help-modal-card li {
      margin: 0 0 8px;
      color: #c5ccd8;
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .help-modal-card ul { margin: 0 0 8px; padding-left: 1.2em; }
    .help-modal-card .help-close {
      margin-top: 12px;
      background: var(--accent);
      color: #fff;
      width: 100%;
    }
    .amc-frame-wrap {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 28px rgba(0,0,0,.25);
    }
    .amc-frame {
      display: block;
      width: 100%;
      height: min(85vh, 900px);
      min-height: 640px;
      border: 0;
      background: #f0f0f0;
    }
    .amc-open-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .amc-open-row a.btn {
      width: auto;
      min-width: 160px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PPTX Notes Viewer <button type="button" class="help-btn" id="helpNotesHome" title="Help" aria-label="Help for Notes Viewer">?</button></h1>

    <div class="drop" id="drop" tabindex="0" role="button"
         aria-label="Open PowerPoint file">
      <div class="icon">📑</div>
      <strong>Open a .pptx file</strong>
      <div class="actions">
        <button type="button" class="btn-primary" id="btnOpen">Open file</button>
      </div>
    </div>

    <button type="button" class="btn btn-shortcuts" id="btnKeyboardShortcuts" title="View keyboard shortcuts">Keyboard shortcut</button>
    <a class="btn btn-amc" id="btnAmcClass" href="#" target="_blank" rel="noopener noreferrer">AMC Teacher Login</a>

    <div class="feedback-row">
      <button type="button" class="btn btn-feedback" id="btnFeedbackCopy">Feedback comment</button>
      <button type="button" class="btn btn-snippet-edit" id="btnFeedbackEdit" title="Edit feedback text" aria-label="Edit feedback text">✏️</button>
    </div>
    <div class="feedback-row">
      <button type="button" class="btn btn-sentences" id="btnSentencesCopy">Create Sentences</button>
      <button type="button" class="btn btn-snippet-edit" id="btnSentencesEdit" title="Edit Create Sentences text" aria-label="Edit Create Sentences text">✏️</button>
    </div>

    <div class="file-input-wrap">
      <input
        type="file"
        id="fileInput"
        accept=".pptx,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/octet-stream"
      >
    </div>

    <p class="status" id="status"></p>
  </div>

  <div class="snippet-modal" id="snippetModal" role="dialog" aria-modal="true" aria-labelledby="snippetModalTitle">
    <div class="snippet-modal-card">
      <h3 id="snippetModalTitle">Edit text</h3>
      <textarea id="snippetEditText" spellcheck="true"></textarea>
      <div class="snippet-modal-actions">
        <button type="button" class="btn btn-cancel" id="snippetEditCancel">Cancel</button>
        <button type="button" class="btn-primary" id="snippetEditSave">Save</button>
      </div>
    </div>
  </div>

  <!-- AMC tools embedded below notes viewer -->
  <div class="page">
    <hr class="divider">
    <h2 class="amc-section-head">AMC Productivity Studio <button type="button" class="help-btn" id="helpStudioHome" title="Help" aria-label="Help for AMC Productivity Studio">?</button></h2>
    <div class="amc-frame-wrap">
      <iframe
        class="amc-frame"
        src="amc-studio.html"
        title="AMC Productivity Studio tools"
        loading="lazy"
      ></iframe>
    </div>
  </div>

  <div class="help-modal" id="helpModal" role="dialog" aria-modal="true" aria-labelledby="helpModalTitle">
    <div class="help-modal-card">
      <h3 id="helpModalTitle">Help</h3>
      <div id="helpModalBody"></div>
      <button type="button" class="btn help-close" id="helpModalClose">Close</button>
    </div>
  </div>

  <script src="jszip.min.js"></script>
  <script src="pptx-loader.js"></script>
  <script>
    (function () {
      // ========== PASTE YOUR AMC TEACHER LOGIN LINK HERE ==========
      var AMC_ONLINE_CLASS_URL = "https://www.xn--fiqv34aqphd4v.com/member/Login_teacher_rwd.aspx";
      // ===========================================================

      var SNIPPETS = {
        feedback: {
          key: "amc_feedback_comment_v1",
          label: "Feedback comment",
          title: "Edit feedback comment",
          defaultText:
            "Thank you for joining today's class! Your skill in reading sentences really stood out. You demonstrated an excellent grasp of the material, significantly enriching our discussions. Additionally, the way you responded to my questions was impressive. Your thoughtful and clear replies showcased a deep understanding of the subject matter.\n\n" +
            "I want to commend your effort and commitment. I'm excited to see your continuous improvement and contributions in future sessions. Keep up the great work! Please review what we covered in class to reinforce your memory. Also, try incorporating the new vocabulary into your daily conversations and focus on improving your pronunciation. Don't forget to pay attention to tricky words, and the linking of sounds between words, and work on your intonation for a more natural flow in speech.",
        },
        sentences: {
          key: "amc_create_sentences_v1",
          label: "Create Sentences",
          title: "Edit Create Sentences text",
          defaultText:
            "Ten example sentences of each word, bold the main word, one brief definition, 5 normal 5 nuance, no need to have text headers to clarify that, just list the sentences, don't have any emoji icons, ignore \"make a sentence\" cause we're already making ten, and ignore making any examples for synonyms if listed. Make sure to have a line break from the next word examples, and don't make it for the synonyms\n\n" +
            "Example:\n" +
            "view (n.) — what you can see from a place or perspective\n" +
            "Lyle booked early to get a seat with a good view of the stage.",
        },
        shortcuts: {
          key: "amc_keyboard_shortcuts_v1",
          label: "Keyboard shortcut",
          title: "Keyboard shortcuts",
          defaultText:
            "Win + V — remember copy history\n\n" +
            "F2 — rename folders faster\n\n" +
            "F12 — Save as\n\n" +
            "Alt + Space + N — minimize window\n" +
            "Alt + Space + X — maximize window\n\n" +
            "Shift + Delete — permanently delete files\n" +
            "without going through the Recycle Bin",
        },
      };

      var drop = document.getElementById("drop");
      var fileInput = document.getElementById("fileInput");
      var btnOpen = document.getElementById("btnOpen");
      var btnAmc = document.getElementById("btnAmcClass");
      var statusEl = document.getElementById("status");
      var btnKeyboardShortcuts = document.getElementById("btnKeyboardShortcuts");
      var btnFeedbackCopy = document.getElementById("btnFeedbackCopy");
      var btnFeedbackEdit = document.getElementById("btnFeedbackEdit");
      var btnSentencesCopy = document.getElementById("btnSentencesCopy");
      var btnSentencesEdit = document.getElementById("btnSentencesEdit");
      var snippetModal = document.getElementById("snippetModal");
      var snippetModalTitle = document.getElementById("snippetModalTitle");
      var snippetEditText = document.getElementById("snippetEditText");
      var snippetEditCancel = document.getElementById("snippetEditCancel");
      var snippetEditSave = document.getElementById("snippetEditSave");
      var editingSnippetId = null;

      if (AMC_ONLINE_CLASS_URL && AMC_ONLINE_CLASS_URL.indexOf("REPLACE_WITH_") === -1) {
        btnAmc.href = AMC_ONLINE_CLASS_URL;
      } else {
        btnAmc.addEventListener("click", function (e) {
          e.preventDefault();
          alert("Set AMC_ONLINE_CLASS_URL in index.html to your class link, then re-upload to GitHub.");
        });
      }

      function setStatus(msg, kind) {
        statusEl.textContent = msg || "";
        statusEl.className = "status" + (kind ? " " + kind : "");
      }

      function getSnippetText(id) {
        var sn = SNIPPETS[id];
        if (!sn) return "";
        try {
          var saved = localStorage.getItem(sn.key);
          if (saved != null && String(saved).trim()) return String(saved);
        } catch (e) {}
        return sn.defaultText;
      }

      function setSnippetText(id, text) {
        var sn = SNIPPETS[id];
        if (!sn) return;
        try {
          localStorage.setItem(sn.key, text);
        } catch (e) {}
      }

      async function copySnippet(id) {
        var sn = SNIPPETS[id];
        var text = getSnippetText(id);
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            throw new Error("no clipboard api");
          }
          setStatus((sn ? sn.label : "Text") + " copied.", "ok");
        } catch (e) {
          try {
            var ta = document.createElement("textarea");
            ta.value = text;
            ta.setAttribute("readonly", "");
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            setStatus((sn ? sn.label : "Text") + " copied.", "ok");
          } catch (err) {
            setStatus("Could not copy — open edit and copy manually.", "error");
          }
        }
      }

      function openSnippetEditor(id) {
        var sn = SNIPPETS[id];
        if (!sn) return;
        editingSnippetId = id;
        if (snippetModalTitle) snippetModalTitle.textContent = sn.title;
        if (snippetEditText) snippetEditText.value = getSnippetText(id);
        if (snippetModal) snippetModal.classList.add("open");
        setTimeout(function () {
          if (snippetEditText) snippetEditText.focus();
        }, 50);
      }

      function closeSnippetEditor() {
        editingSnippetId = null;
        if (snippetModal) snippetModal.classList.remove("open");
      }

      if (btnKeyboardShortcuts) {
        btnKeyboardShortcuts.addEventListener("click", function () {
          openSnippetEditor("shortcuts");
        });
      }
      if (btnFeedbackCopy) {
        btnFeedbackCopy.addEventListener("click", function () {
          copySnippet("feedback");
        });
      }
      if (btnFeedbackEdit) {
        btnFeedbackEdit.addEventListener("click", function () {
          openSnippetEditor("feedback");
        });
      }
      if (btnSentencesCopy) {
        btnSentencesCopy.addEventListener("click", function () {
          copySnippet("sentences");
        });
      }
      if (btnSentencesEdit) {
        btnSentencesEdit.addEventListener("click", function () {
          openSnippetEditor("sentences");
        });
      }
      if (snippetEditCancel) {
        snippetEditCancel.addEventListener("click", closeSnippetEditor);
      }
      if (snippetEditSave) {
        snippetEditSave.addEventListener("click", function () {
          if (!editingSnippetId) return;
          setSnippetText(editingSnippetId, snippetEditText.value);
          var sn = SNIPPETS[editingSnippetId];
          closeSnippetEditor();
          setStatus((sn ? sn.label : "Text") + " saved.", "ok");
        });
      }
      if (snippetModal) {
        snippetModal.addEventListener("click", function (e) {
          if (e.target === snippetModal) closeSnippetEditor();
        });
      }
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && snippetModal && snippetModal.classList.contains("open")) {
          closeSnippetEditor();
        }
        if (e.key === "Escape" && helpModal && helpModal.classList.contains("open")) {
          closeHelp();
        }
      });

      var HELP = {
        notes:
          "<p><strong>PPTX Notes Viewer</strong> opens a PowerPoint so you can read slides and type speaker notes in the browser.</p>" +
          "<ul>" +
          "<li>Open a <code>.pptx</code> file — it loads in the Notes Viewer.</li>" +
          "<li>Edit notes under each slide. Use formatting tools (bold, lists, etc.).</li>" +
          "<li>Press <strong>SAVE</strong> to download a PowerPoint with your notes written into the file.</li>" +
          "<li>Open the downloaded <code>*_notes.pptx</code> in PowerPoint and use <em>View → Notes</em>.</li>" +
          "</ul>" +
          "<p><strong>Keyboard shortcut</strong> opens a list of useful Windows shortcuts (same preview window as ✏️ edit).</p>" +
          "<p><strong>Feedback comment</strong> / <strong>Create Sentences</strong> copy ready-made prompts to the clipboard (✏️ to edit).</p>" +
          "<p><strong>AMC Teacher Login</strong> opens your teacher login page.</p>",
        studio:
          "<p><strong>AMC Productivity Studio</strong> tools appear in the frame below. Use the <strong>?</strong> on each tool tab for details.</p>" +
          "<ul>" +
          "<li><strong>PPTX Slide Extractor</strong> — clean selected slides (or PDF pages) into a blank PowerPoint.</li>" +
          "<li><strong>Image Stripper</strong> — remove pictures/background images from slides.</li>" +
          "<li><strong>Special Strip</strong> — heavy cleanup for BT_INT-style decks.</li>" +
          "<li><strong>Text Formatter</strong> — format markdown-style text.</li>" +
          "<li><strong>Text Extractor</strong> — OCR text from a screenshot/image.</li>" +
          "</ul>",
      };

      var helpModal = document.getElementById("helpModal");
      var helpModalTitle = document.getElementById("helpModalTitle");
      var helpModalBody = document.getElementById("helpModalBody");
      var helpModalClose = document.getElementById("helpModalClose");

      function openHelp(id) {
        var title =
          id === "notes" ? "Help — PPTX Notes Viewer" : "Help — AMC Productivity Studio";
        var body = HELP[id] || "<p>No help available.</p>";
        if (helpModalTitle) helpModalTitle.textContent = title;
        if (helpModalBody) helpModalBody.innerHTML = body;
        if (helpModal) helpModal.classList.add("open");
      }
      function closeHelp() {
        if (helpModal) helpModal.classList.remove("open");
      }
      var helpNotesHome = document.getElementById("helpNotesHome");
      var helpStudioHome = document.getElementById("helpStudioHome");
      if (helpNotesHome) helpNotesHome.addEventListener("click", function () { openHelp("notes"); });
      if (helpStudioHome) helpStudioHome.addEventListener("click", function () { openHelp("studio"); });
      if (helpModalClose) helpModalClose.addEventListener("click", closeHelp);
      if (helpModal) {
        helpModal.addEventListener("click", function (e) {
          if (e.target === helpModal) closeHelp();
        });
      }

      function looksLikePptx(file) {
        if (!file) return false;
        var n = (file.name || "").toLowerCase();
        if (n.endsWith(".pptx")) return true;
        var t = (file.type || "").toLowerCase();
        if (t.indexOf("presentationml") >= 0 || t.indexOf("powerpoint") >= 0) return true;
        if (!n && file.size > 1000) return true;
        return false;
      }

      async function handleFile(file) {
        if (!file) return;
        if (!looksLikePptx(file) && !(file.name || "").toLowerCase().endsWith(".ppt")) {
          setStatus("Please choose a PowerPoint .pptx file.", "error");
          return;
        }
        if ((file.name || "").toLowerCase().endsWith(".ppt") && !file.name.toLowerCase().endsWith(".pptx")) {
          setStatus("Old .ppt format is not supported. Save as .pptx in PowerPoint first.", "error");
          return;
        }

        btnOpen.disabled = true;
        setStatus("Loading “" + (file.name || "presentation") + "”… please wait");

        // Let the status text paint before heavy zip parsing freezes the main thread
        await new Promise(function (r) {
          setTimeout(r, 30);
        });

        var pre = null;
        var apple = window.PptxNotesLoader && PptxNotesLoader.isAppleMobile && PptxNotesLoader.isAppleMobile();
        if (!apple && window.PptxNotesLoader && PptxNotesLoader.openPlaceholderTab) {
          pre = PptxNotesLoader.openPlaceholderTab();
        }

        try {
          var result = await PptxNotesLoader.openPptxInNewTab(file, "viewer.html", {
            preOpenedWindow: pre,
            sameTabFallback: true,
          });
          if (result.mode === "same-tab") {
            setStatus("Opening viewer…", "ok");
          } else {
            setStatus(
              "Opened “" + result.deckKey + "” (" + result.slides + " slides) in a new tab.",
              "ok"
            );
          }
        } catch (err) {
          console.error(err);
          if (pre && !pre.closed) {
            try { pre.close(); } catch (e) {}
          }
          setStatus(err && err.message ? err.message : String(err), "error");
        }
        btnOpen.disabled = false;
      }

      function pickFile(e) {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }
        fileInput.value = "";
        fileInput.click();
      }

      btnOpen.addEventListener("click", pickFile);
      drop.addEventListener("click", function (e) {
        if (e.target === btnOpen || btnOpen.contains(e.target)) return;
        pickFile(e);
      });
      drop.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          pickFile(e);
        }
      });
      fileInput.addEventListener("change", function () {
        var f = fileInput.files && fileInput.files[0];
        if (f) handleFile(f);
      });

      ["dragenter", "dragover"].forEach(function (ev) {
        drop.addEventListener(ev, function (e) {
          e.preventDefault();
          e.stopPropagation();
          drop.classList.add("dragover");
        });
      });
      ["dragleave", "drop"].forEach(function (ev) {
        drop.addEventListener(ev, function (e) {
          e.preventDefault();
          e.stopPropagation();
          if (ev === "dragleave") drop.classList.remove("dragover");
        });
      });
      drop.addEventListener("drop", function (e) {
        drop.classList.remove("dragover");
        var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) handleFile(f);
      });
    })();
  </script>
</body>
</html>
