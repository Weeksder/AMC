<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1d23">
  <meta name="format-detection" content="telephone=no">
  <title>PPTX Notes Viewer</title>
  <style>
    :root {
      --bg: #1a1d23;
      --card: #252a33;
      --border: #3a4150;
      --text: #eef1f6;
      --muted: #9aa3b2;
      --accent: #e36c0a;
      --accent-hover: #f07d1c;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #2a3140 0%, var(--bg) 55%);
      color: var(--text);
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: calc(32px + var(--safe-top)) 20px calc(48px + var(--safe-bottom));
    }
    h1 {
      font-size: 1.7rem;
      font-weight: 650;
      margin: 0 0 20px;
      letter-spacing: -0.02em;
    }
    .drop {
      border: 2px dashed var(--border);
      border-radius: 16px;
      background: var(--card);
      padding: 36px 20px;
      text-align: center;
      transition: border-color .15s, background .15s;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .drop:hover, .drop.dragover, .drop:focus-visible {
      border-color: var(--accent);
      background: #2c3340;
      outline: none;
    }
    .drop .icon { font-size: 2.2rem; margin-bottom: 10px; }
    .drop strong { display: block; font-size: 1.05rem; margin-bottom: 6px; }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    button, a.btn {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      min-height: 48px;
      touch-action: manipulation;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:active { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.55; cursor: default; }
    .btn-amc {
      background: #2b6cb0;
      color: #fff;
      width: 100%;
      margin-top: 16px;
    }
    .btn-amc:active { background: #2c5282; }
    .feedback-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
      margin-top: 10px;
    }
    .btn-feedback {
      flex: 1;
      background: #2f855a;
      color: #fff;
      min-height: 48px;
    }
    .btn-feedback:active { background: #276749; }
    .btn-feedback-edit {
      flex: 0 0 44px;
      width: 44px;
      min-width: 44px;
      padding: 0;
      background: #3a4150;
      color: #eef1f6;
      font-size: 1.15rem;
      line-height: 1;
      border: 1px solid var(--border);
    }
    .btn-feedback-edit:active { background: #4a5568; }
    .btn-feedback-edit:hover { background: #454d5c; }
    .feedback-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,.55);
      padding: calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
      align-items: center;
      justify-content: center;
    }
    .feedback-modal.open { display: flex; }
    .feedback-modal-card {
      width: min(560px, 100%);
      max-height: min(85vh, 720px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }
    .feedback-modal-card h3 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 650;
    }
    .feedback-modal-card textarea {
      width: 100%;
      min-height: 220px;
      flex: 1;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #1a1d23;
      color: var(--text);
      padding: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .feedback-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .feedback-modal-actions .btn-primary { min-width: 100px; }
    .feedback-modal-actions .btn-cancel {
      background: #3a4150;
      color: #eef1f6;
    }
    .status {
      margin-top: 18px;
      min-height: 1.4em;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
      word-break: break-word;
    }
    .status.error { color: #ff8e8e; }
    .status.ok { color: #8fd49a; }
    .file-input-wrap {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
    }
    /* —— AMC tools section (below notes viewer) —— */
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px calc(40px + var(--safe-bottom));
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 36px 0 28px;
    }
    .amc-section-head {
      margin: 0 0 8px;
      font-size: 1.45rem;
      font-weight: 650;
      letter-spacing: -0.02em;
    }
    .amc-section-sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .amc-frame-wrap {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 28px rgba(0,0,0,.25);
    }
    .amc-frame {
      display: block;
      width: 100%;
      height: min(85vh, 900px);
      min-height: 640px;
      border: 0;
      background: #f0f0f0;
    }
    .amc-open-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .amc-open-row a.btn {
      width: auto;
      min-width: 160px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PPTX Notes Viewer</h1>

    <div class="drop" id="drop" tabindex="0" role="button"
         aria-label="Open PowerPoint file">
      <div class="icon">📑</div>
      <strong>Open a .pptx file</strong>
      <div class="actions">
        <button type="button" class="btn-primary" id="btnOpen">Open file</button>
      </div>
    </div>

    <a class="btn btn-amc" id="btnAmcClass" href="#" target="_blank" rel="noopener noreferrer">AMC Teacher Login</a>

    <div class="feedback-row">
      <button type="button" class="btn btn-feedback" id="btnFeedbackCopy">Feedback comment</button>
      <button type="button" class="btn btn-feedback-edit" id="btnFeedbackEdit" title="Edit feedback text" aria-label="Edit feedback text">✏️</button>
    </div>

    <div class="file-input-wrap">
      <input
        type="file"
        id="fileInput"
        accept=".pptx,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/octet-stream"
      >
    </div>

    <p class="status" id="status"></p>
  </div>

  <div class="feedback-modal" id="feedbackModal" role="dialog" aria-modal="true" aria-labelledby="feedbackModalTitle">
    <div class="feedback-modal-card">
      <h3 id="feedbackModalTitle">Edit feedback comment</h3>
      <textarea id="feedbackEditText" spellcheck="true"></textarea>
      <div class="feedback-modal-actions">
        <button type="button" class="btn btn-cancel" id="feedbackEditCancel">Cancel</button>
        <button type="button" class="btn-primary" id="feedbackEditSave">Save</button>
      </div>
    </div>
  </div>

  <!-- AMC tools embedded below notes viewer -->
  <div class="page">
    <hr class="divider">
    <h2 class="amc-section-head">AMC Productivity Studio</h2>
    <p class="amc-section-sub">
      Text extractor, slide merge, image strip, special strip, and text formatter
      (web version of AMC Pdf’s modification).
    </p>
    <div class="amc-frame-wrap">
      <iframe
        class="amc-frame"
        src="amc-studio.html"
        title="AMC Productivity Studio tools"
        loading="lazy"
      ></iframe>
    </div>
  </div>

  <script src="jszip.min.js"></script>
  <script src="pptx-loader.js"></script>
  <script>
    (function () {
      // ========== PASTE YOUR AMC TEACHER LOGIN LINK HERE ==========
      var AMC_ONLINE_CLASS_URL = "https://www.xn--fiqv34aqphd4v.com/member/Login_teacher_rwd.aspx";
      // ===========================================================

      var FEEDBACK_STORAGE_KEY = "amc_feedback_comment_v1";
      var DEFAULT_FEEDBACK_TEXT =
        "Thank you for joining today's class! Your skill in reading sentences really stood out. You demonstrated an excellent grasp of the material, significantly enriching our discussions. Additionally, the way you responded to my questions was impressive. Your thoughtful and clear replies showcased a deep understanding of the subject matter.\n\n" +
        "I want to commend your effort and commitment. I'm excited to see your continuous improvement and contributions in future sessions. Keep up the great work! Please review what we covered in class to reinforce your memory. Also, try incorporating the new vocabulary into your daily conversations and focus on improving your pronunciation. Don't forget to pay attention to tricky words, and the linking of sounds between words, and work on your intonation for a more natural flow in speech.";

      var drop = document.getElementById("drop");
      var fileInput = document.getElementById("fileInput");
      var btnOpen = document.getElementById("btnOpen");
      var btnAmc = document.getElementById("btnAmcClass");
      var statusEl = document.getElementById("status");
      var btnFeedbackCopy = document.getElementById("btnFeedbackCopy");
      var btnFeedbackEdit = document.getElementById("btnFeedbackEdit");
      var feedbackModal = document.getElementById("feedbackModal");
      var feedbackEditText = document.getElementById("feedbackEditText");
      var feedbackEditCancel = document.getElementById("feedbackEditCancel");
      var feedbackEditSave = document.getElementById("feedbackEditSave");

      if (AMC_ONLINE_CLASS_URL && AMC_ONLINE_CLASS_URL.indexOf("REPLACE_WITH_") === -1) {
        btnAmc.href = AMC_ONLINE_CLASS_URL;
      } else {
        btnAmc.addEventListener("click", function (e) {
          e.preventDefault();
          alert("Set AMC_ONLINE_CLASS_URL in index.html to your class link, then re-upload to GitHub.");
        });
      }

      function setStatus(msg, kind) {
        statusEl.textContent = msg || "";
        statusEl.className = "status" + (kind ? " " + kind : "");
      }

      function getFeedbackText() {
        try {
          var saved = localStorage.getItem(FEEDBACK_STORAGE_KEY);
          if (saved != null && String(saved).trim()) return String(saved);
        } catch (e) {}
        return DEFAULT_FEEDBACK_TEXT;
      }

      function setFeedbackText(text) {
        try {
          localStorage.setItem(FEEDBACK_STORAGE_KEY, text);
        } catch (e) {}
      }

      async function copyFeedbackText() {
        var text = getFeedbackText();
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            throw new Error("no clipboard api");
          }
          setStatus("Feedback comment copied.", "ok");
        } catch (e) {
          try {
            var ta = document.createElement("textarea");
            ta.value = text;
            ta.setAttribute("readonly", "");
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            setStatus("Feedback comment copied.", "ok");
          } catch (err) {
            setStatus("Could not copy — open edit and copy manually.", "error");
          }
        }
      }

      function openFeedbackEditor() {
        feedbackEditText.value = getFeedbackText();
        feedbackModal.classList.add("open");
        setTimeout(function () {
          feedbackEditText.focus();
        }, 50);
      }

      function closeFeedbackEditor() {
        feedbackModal.classList.remove("open");
      }

      if (btnFeedbackCopy) {
        btnFeedbackCopy.addEventListener("click", function () {
          copyFeedbackText();
        });
      }
      if (btnFeedbackEdit) {
        btnFeedbackEdit.addEventListener("click", openFeedbackEditor);
      }
      if (feedbackEditCancel) {
        feedbackEditCancel.addEventListener("click", closeFeedbackEditor);
      }
      if (feedbackEditSave) {
        feedbackEditSave.addEventListener("click", function () {
          setFeedbackText(feedbackEditText.value);
          closeFeedbackEditor();
          setStatus("Feedback comment saved.", "ok");
        });
      }
      if (feedbackModal) {
        feedbackModal.addEventListener("click", function (e) {
          if (e.target === feedbackModal) closeFeedbackEditor();
        });
      }
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && feedbackModal && feedbackModal.classList.contains("open")) {
          closeFeedbackEditor();
        }
      });

      function looksLikePptx(file) {
        if (!file) return false;
        var n = (file.name || "").toLowerCase();
        if (n.endsWith(".pptx")) return true;
        var t = (file.type || "").toLowerCase();
        if (t.indexOf("presentationml") >= 0 || t.indexOf("powerpoint") >= 0) return true;
        if (!n && file.size > 1000) return true;
        return false;
      }

      async function handleFile(file) {
        if (!file) return;
        if (!looksLikePptx(file) && !(file.name || "").toLowerCase().endsWith(".ppt")) {
          setStatus("Please choose a PowerPoint .pptx file.", "error");
          return;
        }
        if ((file.name || "").toLowerCase().endsWith(".ppt") && !file.name.toLowerCase().endsWith(".pptx")) {
          setStatus("Old .ppt format is not supported. Save as .pptx in PowerPoint first.", "error");
          return;
        }

        btnOpen.disabled = true;
        setStatus("Loading “" + (file.name || "presentation") + "”… please wait");

        // Let the status text paint before heavy zip parsing freezes the main thread
        await new Promise(function (r) {
          setTimeout(r, 30);
        });

        var pre = null;
        var apple = window.PptxNotesLoader && PptxNotesLoader.isAppleMobile && PptxNotesLoader.isAppleMobile();
        if (!apple && window.PptxNotesLoader && PptxNotesLoader.openPlaceholderTab) {
          pre = PptxNotesLoader.openPlaceholderTab();
        }

        try {
          var result = await PptxNotesLoader.openPptxInNewTab(file, "viewer.html", {
            preOpenedWindow: pre,
            sameTabFallback: true,
          });
          if (result.mode === "same-tab") {
            setStatus("Opening viewer…", "ok");
          } else {
            setStatus(
              "Opened “" + result.deckKey + "” (" + result.slides + " slides) in a new tab.",
              "ok"
            );
          }
        } catch (err) {
          console.error(err);
          if (pre && !pre.closed) {
            try { pre.close(); } catch (e) {}
          }
          setStatus(err && err.message ? err.message : String(err), "error");
        }
        btnOpen.disabled = false;
      }

      function pickFile(e) {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }
        fileInput.value = "";
        fileInput.click();
      }

      btnOpen.addEventListener("click", pickFile);
      drop.addEventListener("click", function (e) {
        if (e.target === btnOpen || btnOpen.contains(e.target)) return;
        pickFile(e);
      });
      drop.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          pickFile(e);
        }
      });
      fileInput.addEventListener("change", function () {
        var f = fileInput.files && fileInput.files[0];
        if (f) handleFile(f);
      });

      ["dragenter", "dragover"].forEach(function (ev) {
        drop.addEventListener(ev, function (e) {
          e.preventDefault();
          e.stopPropagation();
          drop.classList.add("dragover");
        });
      });
      ["dragleave", "drop"].forEach(function (ev) {
        drop.addEventListener(ev, function (e) {
          e.preventDefault();
          e.stopPropagation();
          if (ev === "dragleave") drop.classList.remove("dragover");
        });
      });
      drop.addEventListener("drop", function (e) {
        drop.classList.remove("dragover");
        var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) handleFile(f);
      });
    })();
  </script>
</body>
</html>
